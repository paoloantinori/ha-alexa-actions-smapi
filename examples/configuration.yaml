# ---------------------------------------------------------------------------
# Example Home Assistant configuration for alexa_actions
# ---------------------------------------------------------------------------
#
# 1. Required input_text entity
#
#    The integration writes the notification payload to this entity.
#    Add it to your configuration.yaml (or a split package):
#
input_text:
  alexa_actionable_notification:
    name: Alexa Actionable Notification
    # 255 is the shortest reliable max for the state attribute across
    # all HA versions that the integration supports.  The actual payload
    # is a JSON string that can exceed this when options are long, so if
    # you see truncated payloads increase max or move the entity to a
    # helper defined through the UI (no length limit).
    max: 255

